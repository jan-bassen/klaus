services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: klaus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=16MB
      -c maintenance_work_mem=64MB
      -c max_connections=20
      -c wal_compression=on
      -c checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d klaus"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"
    mem_limit: 2g
    memswap_limit: 2g

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
      - .env.secrets
    environment:
      # Override DATABASE_URL so the app always reaches the postgres service by name,
      # regardless of what localhost-based URL is set in .env for native dev.
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/klaus
      - FILES_DIR=/app/files
    volumes:
      - baileys_auth:/app/auth
      - ./src/agents:/app/src/agents:ro
      - files_data:/app/files
      - vault_data:/app/vault
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 768m
    memswap_limit: 768m

  studio:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/klaus
    command: ["bunx", "drizzle-kit", "studio", "--host", "0.0.0.0", "--port", "4983"]
    ports:
      - "127.0.0.1:4983:4983"
    mem_limit: 256m
    memswap_limit: 256m

  backup:
    image: postgres:17-alpine
    restart: "no"
    profiles: ["backup"]
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - ${BACKUP_DIR:-./backups}:/backups
      - baileys_auth:/baileys_auth:ro
      - files_data:/files_data:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "/backup.sh"]
    mem_limit: 128m
    memswap_limit: 128m

  obsidian-sync:
    image: node:22-alpine
    restart: unless-stopped
    entrypoint: ["sh", "-c"]
    command:
      - |
        npm install -g obsidian-headless &&
        ob sync --continuous --vault "$OBSIDIAN_VAULT_NAME" --path /vault
    env_file:
      - .env.secrets
    volumes:
      - vault_data:/vault
      - obsidian_config:/root/.config/obsidian-headless
    mem_limit: 256m
    memswap_limit: 256m

volumes:
  postgres_data:
  baileys_auth:
  files_data:
  vault_data:
  obsidian_config:
