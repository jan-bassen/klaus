services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: klaus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=16MB
      -c maintenance_work_mem=64MB
      -c max_connections=20
      -c wal_compression=on
      -c checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d klaus"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 2g
    memswap_limit: 2g

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
      - .env.secrets
    environment:
      # Override DATABASE_URL so the app always reaches the postgres service by name,
      # regardless of what localhost-based URL is set in .env for native dev.
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/klaus
    volumes:
      - baileys_auth:/app/auth
      - ./src/agents:/app/src/agents:ro
      - files_data:/app/files
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 768m
    memswap_limit: 768m

volumes:
  postgres_data:
  baileys_auth:
  files_data:
