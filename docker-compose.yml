services:
  app:
    build: .
    user: root
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=3000
      - LOG_FORMAT=pretty
      - BAILEYS_AUTH_FOLDER=/app/auth
      - FILES_DIR=/app/files
      - DATA_DIR=/app/data
      - VAULT_DIR=/app/vault
    volumes:
      - baileys_auth:/app/auth
      - files_data:/app/files
      - vault_data:/app/vault
      - data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3000/healthz || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 768m
    memswap_limit: 768m

  sync:
    build:
      context: .
      dockerfile: Dockerfile.obsidian-sync
    restart: unless-stopped
    entrypoint: ["sh", "/scripts/obsidian-sync.sh"]
    env_file:
      - .env
    volumes:
      - vault_data:/vault
      - obsidian_config:/root/.config/obsidian-headless
      - ./scripts/obsidian-sync.sh:/scripts/obsidian-sync.sh:ro
    mem_limit: 256m
    memswap_limit: 256m

  backup:
    image: alpine:3
    restart: "no"
    profiles: ["backup"]
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - ${BACKUP_DIR:-./backups}:/backups
      - baileys_auth:/baileys_auth:ro
      - files_data:/files_data:ro
      - data:/data:ro
      - vault_data:/vault_data:ro
    command: ["sh", "/backup.sh"]
    mem_limit: 128m
    memswap_limit: 128m

volumes:
  baileys_auth:
  files_data:
  vault_data:
  data:
  obsidian_config:
