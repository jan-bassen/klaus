services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=3000
      - BAILEYS_AUTH_FOLDER=/app/config/baileys
      - FILES_DIR=/app/files
      - DATA_DIR=/app/data
      - VAULT_DIR=/app/vault
    volumes:
      - config:/app/config
      - files:/app/files
      - vault:/app/vault
      - data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 768m
    memswap_limit: 768m

  obsidian:
    build:
      context: .
      dockerfile: Dockerfile.obsidian-sync
    restart: unless-stopped
    entrypoint: ["sh", "/scripts/obsidian-sync.sh"]
    env_file:
      - .env
    volumes:
      - vault:/vault
      - config:/root/.config
      - ./scripts/obsidian-sync.sh:/scripts/obsidian-sync.sh:ro
    mem_limit: 256m
    memswap_limit: 256m

  backup:
    image: alpine:3
    restart: "no"
    profiles: ["backup"]
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - ${BACKUP_DIR:-./backups}:/backups
      - config:/config:ro
      - files:/files:ro
      - data:/data:ro
      - vault:/vault:ro
    command: ["sh", "/backup.sh"]
    mem_limit: 128m
    memswap_limit: 128m

volumes:
  data:
  files:
  vault:
  config:
