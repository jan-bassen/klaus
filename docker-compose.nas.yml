# NAS-specific overrides for Synology DS220+.
# Usage: docker compose -f docker-compose.yml -f docker-compose.nas.yml [command]
# The Makefile `nas-*` targets load this automatically.

services:
  # Self-hosted GitHub Actions runner — pulls CI jobs from GitHub, no inbound connections needed.
  runner:
    image: myoung34/github-runner:latest
    restart: unless-stopped
    environment:
      REPO_URL: ${GITHUB_REPO_URL}
      RUNNER_NAME: nas-runner
      RUNNER_TOKEN: ${GITHUB_RUNNER_TOKEN}
      RUNNER_WORKDIR: /tmp/runner/work
      LABELS: nas
      DISABLE_AUTO_UPDATE: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner_data:/tmp/runner
    mem_limit: 512m
    memswap_limit: 512m

  # One-shot backup service — run via `make nas-backup` or Synology Task Scheduler.
  backup:
    image: postgres:17-alpine
    restart: "no"
    profiles: ["backup"]
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - /volume1/backups/klaus:/backups
      - baileys_auth:/baileys_auth:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "/backup.sh"]
    mem_limit: 128m
    memswap_limit: 128m

volumes:
  runner_data:
