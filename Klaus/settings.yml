providers:
  active: claude
  claude:
    sdk: anthropic
    small: claude-haiku-4-5
    medium: claude-sonnet-4-6
    large: claude-opus-4-6
    coldTemperature: 0
    hotTemperature: 1
    creativeTopP: 0.95
    rigidTopP: 0.1
  chatgpt:
    sdk: openai
    small: gpt-5.4-nano
    medium: gpt-5.4-mini
    large: gpt-5.4
    coldTemperature: 0
    hotTemperature: 1.5
    creativeTopP: 0.95
    rigidTopP: 0.1
  gemini:
    sdk: google
    small: gemini-3.1-flash-lite-preview
    medium: gemini-3-flash-preview
    large: gemini-3.1-pro-preview-customtools
    coldTemperature: 0
    hotTemperature: 1.5
    creativeTopP: 0.95
    rigidTopP: 0.1

context:
  conversationChars: 80000
  defaultConversationLimit: 20
  traceDepth: 3
  conversationLookbackDays: 7

rateLimits:
  messages:
    max: 30
    windowMs: 60000
  modelCalls:
    max: 60
    windowMs: 60000

tts:
  model: eleven_ttv_v3
  # ElevenLabs voice ID — pick one at https://elevenlabs.io/app/voice-library
  voiceId: ""

stt:
  model: scribe_v2
  timeoutMs: 30000
  agentTriggers:
    - hey
    - at
    - an
    - to
    - dear

retries:
  max: 3
  backoffMs: 1000

send:
  interMessageDelayMs: 1500

llm:
  timeoutMs: 120000
  maxSteps: 10

defaultAgent: assistant
locale: en-GB
timezone: Europe/London

dispatch:
  maxChainDepth: 10

persistent:
  minNextRunMs: 60000
  maxNextRunMs: 604800000
  defaultNextRun: 1h

trail:
  enabled: true
  retentionDays: 3

watcher:
  debounceMs: 1000

vision:
  maxImageDimension: 2048

document:
  maxChars: 40000
  ocrEnabled: true

whatsapp:
  selfMode: false
  systemLabel: System
  maxDownloadBytes: 67108864
  mediaDownloadTimeoutMs: 30000
  offlineWindowMs: 300000
  maxSeenSize: 10000
  confirmTimeoutMs: 60000

vault:
  folders:
    - path: ""
      default: full
  internalPermission:
    default: read
    request: full
  maxListEntries: 200
