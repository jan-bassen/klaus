basics:
  locale: en-GB
  timezone: Europe/London
  # allowedChatId is set at runtime via /setup; uncomment to pin manually
  # allowedChatId: ""

agent:
  defaultAgent: assistant
  maxSteps: 10
  timeout: 120000
  retries:
    max: 3
    backoffMs: 1000
  maxChainDepth: 10
  lookbackDays: 7
  # Cap on reasoning text replayed into history per past step.
  maxReasoningChars: 2000

agentDefaults:
  modelTier: medium
  voice: auto
  accept: false
  temp: default
  topP: default
  reasoningEffort: default
  historyLimit: 20
  historyScope: full
  showTrace: true
  report: agent
  vault:
    "*": full

# OpenAI-compatible chat completions endpoint. Default is OpenRouter; switch
# providers by changing baseURL + apiKeyEnv + model IDs (any OpenAI-compatible
# endpoint works). Model IDs are passed verbatim — for OpenRouter, use the
# `<vendor>/<model>` form.
provider:
  baseURL: https://openrouter.ai/api/v1
  apiKeyEnv: OPENROUTER_API_KEY
  small: anthropic/claude-haiku-4-5
  medium: anthropic/claude-sonnet-4-6
  large: anthropic/claude-opus-4-7
  coldTemperature: 0
  hotTemperature: 1
  creativeTopP: 0.95
  rigidTopP: 0.1

media:
  voice:
    tts:
      model: eleven_ttv_v3
      # ElevenLabs voice ID — pick one at https://elevenlabs.io/app/voice-library
      voiceId: ""
    stt:
      model: scribe_v2
      timeout: 30000
      agentTriggers:
        - hey
        - at
        - an
        - to
        - dear
  image:
    vision:
      maxSize: 2048
    gen:
      provider: ""
      model: openai/gpt-5.4-image-2
  document:
    ocr: true
    maxChars: 40000

whatsapp:
  selfMode: false
  systemLabel: System
  sendDelay: 1500
  retries:
    max: 3
    backoffMs: 1000
  maxDownload: 67108864
  mediaDownloadTimeout: 30000
  offlineWindow: 300000
  maxSeenSize: 10000

vault:
  watcherDebounce: 1000
  maxList: 200
  folders:
    - path: ""
      default: full
  internalPermission:
    default: read

persistence:
  minNextRun: 60000
  maxNextRun: 604800000
  defaultNextRun: 1h

reports:
  # Mirror each turn's report into {vault}/reports/<date>.md for human reading.
  # JSONL under {dataDir}/logs/ is always written when settings.agentDefaults.report != "none".
  vaultMarkdown: false
  # Days of report history surfaced via /reports.
  lookbackDays: 7

# Bundled obsidian-headless supervisor. The `ob sync --continuous` child is
# always-on — credentials must be supplied via env vars (OBSIDIAN_EMAIL,
# OBSIDIAN_PASSWORD, OBSIDIAN_VAULT_NAME, optional OBSIDIAN_MFA and
# OBSIDIAN_E2EE_PASSWORD). Login state lives under {dataDir}/obsidian-headless
# so it persists across container restarts via the existing data volume.
sync:
  shutdownTimeoutMs: 5000
  restartBackoff:
    initialMs: 1000
    maxMs: 30000
    # If the child stays up longer than this, reset the backoff to initialMs
    # — covers the "long-running but eventually crashes" case without locking
    # a hot crash-loop into the 30s ceiling.
    resetAfterUpMs: 60000
