voice:
  aliases: [v]
  description: Reply as voice message
  overrides: { forceVoice: true }

clean:
  aliases: [cl]
  description: Skip conversation history
  overrides: { skipHistory: true }

ghost:
  aliases: [g]
  description: Ephemeral call, no persistence
  overrides: { ghost: true, skipHistory: true }

simulate:
  aliases: [sim]
  description: Dry-run — fake external/stateful tools, no real side effects
  overrides: { simulate: true }

accept:
  aliases: [a]
  description: Auto-accept confirmations
  overrides: { autoAccept: true }

small:
  aliases: [s]
  description: Use small model
  overrides: { modelTier: small }

medium:
  aliases: [m]
  description: Use medium model
  overrides: { modelTier: medium }

large:
  aliases: [l]
  description: Use large model
  overrides: { modelTier: large }

claude:
  description: Use Claude provider
  overrides: { provider: claude }

chatgpt:
  description: Use ChatGPT provider
  overrides: { provider: chatgpt }

gemini:
  description: Use Gemini provider
  overrides: { provider: gemini }

cold:
  aliases: [c]
  description: Low temperature
  overrides: { temperaturePreset: cold }

hot:
  aliases: [h]
  description: High temperature
  overrides: { temperaturePreset: hot }

creative:
  aliases: [cr]
  description: High topP sampling
  overrides: { topPPreset: creative }

rigid:
  aliases: [r]
  description: Low topP sampling
  overrides: { topPPreset: rigid }

no-tools:
  aliases: [nt]
  description: Disable tools
  overrides: { toolChoice: "none" }

use-tools:
  aliases: [ut]
  description: Force tool use
  overrides: { toolChoice: required }

low:
  aliases: [lo]
  description: Low reasoning effort
  overrides: { reasoningEffort: low }

high:
  aliases: [hi]
  description: High reasoning effort
  overrides: { reasoningEffort: high }

fast:
  aliases: [f]
  description: Fast inference
  overrides: { fast: true }
