name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'src/agents/**'   # agent-only changes use the faster agents.yml workflow

jobs:
  test:
    runs-on: nas
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test src/__tests__/context src/__tests__/core src/__tests__/whatsapp

  deploy:
    needs: test
    runs-on: nas
    env:
      COMPOSE: docker compose -f docker-compose.yml -f docker-compose.nas.yml
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: 1password/install-cli-action@v1

      - name: Sync agent files to bind mount
        run: cp -r src/agents ./agents

      - name: Build app image
        run: op run --env-file .env -- ${{ env.COMPOSE }} build app

      - name: Restart app
        run: op run --env-file .env -- ${{ env.COMPOSE }} up -d app
